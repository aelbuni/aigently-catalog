name: Publish @aigently/mcp-server

on:
  push:
    tags:
      - "mcp-server/v*"

jobs:
  publish:
    name: Build → Test → Publish
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write   # required for npm provenance

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          registry-url: "https://registry.npmjs.org"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Build (includes catalog-data copy)
        run: npm run build -w @aigently/mcp-server

      - name: Smoke test
        run: npm test -w @aigently/mcp-server

      - name: Publish to npm
        run: npm publish --workspace packages/mcp-server --provenance
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
