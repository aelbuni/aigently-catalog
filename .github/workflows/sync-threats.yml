name: Sync Threat Intelligence

on:
  schedule:
    - cron: "0 6 * * 1" # weekly on Monday at 06:00 UTC
  workflow_dispatch:
    inputs:
      force_summarize:
        description: "Re-summarize all rules (FORCE=1)"
        required: false
        default: "false"

jobs:
  sync:
    name: Ingest → Amplify → Summarize → Export → Commit
    runs-on: ubuntu-latest
    timeout-minutes: 90
    permissions:
      contents: write
      pull-requests: write

    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Bootstrap — migrate + seed stacks
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: npm run db:seed:upsert

      - name: Phase 1 — Sync CVE threats
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          NVD_API_KEY:  ${{ secrets.NVD_API_KEY }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: npm run sync:threats

      - name: Phase 2 — Amplify new threats
        env:
          DATABASE_URL:      ${{ secrets.DATABASE_URL }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          BATCH_SIZE:        "9999"
        run: npm run amplify:threats

      - name: Phase 3 — Summarize security-pattern rules
        env:
          DATABASE_URL:      ${{ secrets.DATABASE_URL }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          FORCE: ${{ github.event.inputs.force_summarize == 'true' && '1' || '' }}
        run: npm run summarize:rules

      - name: Phase 4 — Synthesize guardrails
        env:
          DATABASE_URL:      ${{ secrets.DATABASE_URL }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: npm run synthesize:guardrails

      - name: Phase 5 — Export catalog to JSON
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: npm run export:catalog

      - name: Phase 6 — Open or update catalog PR
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config user.name  "aigently-bot"
          git config user.email "bot@aigently.io"

          BRANCH="bot/catalog-sync-$(date -u +%Y-%m-%d)"

          # Branch from the latest remote main to avoid race conditions
          git fetch origin main
          git checkout -B "$BRANCH" origin/main

          # Stage the catalog artifacts produced by earlier phases
          git add packages/catalog-data/
          if git diff --staged --quiet; then
            echo "Nothing to commit — catalog unchanged. Skipping PR."
            exit 0
          fi

          git commit -m "chore(catalog): sync $(date -u +%Y-%m-%d)"
          git push --force-with-lease origin "$BRANCH"

          # Open PR (no-op if it already exists for today's branch)
          gh pr create \
            --title "chore(catalog): sync $(date -u +%Y-%m-%d)" \
            --body "Automated weekly threat intelligence sync. Security scan runs on this PR before merge." \
            --base main \
            --head "$BRANCH" \
            --label "catalog-sync" \
            || true

          # Auto-merge once all required checks pass
          gh pr merge "$BRANCH" --auto --squash --delete-branch || true

      - name: Notify on failure
        if: failure()
        run: |
          echo "Pipeline failed - check sync_log table and step logs above"
          echo "Phases: 1=sync 2=amplify 3=summarize-rules 4=synthesize-guardrails 5=export 6=commit"
