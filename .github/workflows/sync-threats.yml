name: Sync Threat Intelligence

on:
  schedule:
    - cron: "0 6 * * *" # daily at 06:00 UTC
  workflow_dispatch:
    inputs:
      force_summarize:
        description: "Re-summarize all rules (FORCE=1)"
        required: false
        default: "false"

jobs:
  sync:
    name: Ingest → Amplify → Summarize → Export → Commit
    runs-on: ubuntu-latest
    timeout-minutes: 90
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Phase 1 — Sync CVE threats
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          NVD_API_KEY:  ${{ secrets.NVD_API_KEY }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: npm run sync:threats

      - name: Phase 2 — Amplify new threats
        env:
          DATABASE_URL:      ${{ secrets.DATABASE_URL }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: npm run amplify:threats

      - name: Phase 3 — Summarize security-pattern rules
        env:
          DATABASE_URL:      ${{ secrets.DATABASE_URL }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          FORCE: ${{ github.event.inputs.force_summarize == 'true' && '1' || '' }}
        run: npm run summarize:rules

      - name: Phase 4 — Export catalog to JSON
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: npm run export:catalog -w web

      - name: Phase 5 — Commit updated catalog artifacts
        run: |
          git config user.name  "aigently-bot"
          git config user.email "bot@aigently.io"
          git add packages/catalog-data/
          git diff --staged --quiet || git commit -m "chore(catalog): sync $(date -u +%Y-%m-%d)"
          git push

      - name: Notify on failure
        if: failure()
        run: echo "Pipeline failed — check sync_log table and step logs above"
